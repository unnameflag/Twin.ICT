<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twin Alpha ICT | Pro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            backdrop-filter: brightness(0.3);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
        }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <div class="glass w-full max-w-lg p-6 mb-6 text-center">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent">TWIN ALPHA PRO</h1>
        <div class="mt-2 text-xs text-gray-400 flex justify-center items-center gap-2">
            <span class="status-dot bg-green-500"></span> ICT AI ENGINE ACTIVE
        </div>
    </div>

    <div class="glass w-full max-w-lg overflow-hidden mb-6" style="height: 400px;">
        <div id="tradingview_pro" class="h-full"></div>
    </div>

    <div class="glass w-full max-w-lg p-6 mb-6">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🤖 ICT AI Scanner</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                <p class="text-[10px] text-gray-500">HTF BIAS</p>
                <p class="text-red-500 font-bold" id="bias">BEARISH ↓</p>
            </div>
            <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                <p class="text-[10px] text-gray-500">BSL TARGET</p>
                <p class="text-yellow-500 font-bold">2298.19</p>
            </div>
            <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                <p class="text-[10px] text-gray-500">SSL TARGET</p>
                <p class="text-blue-500 font-bold">2283.00</p>
            </div>
            <div class="bg-black/40 p-3 rounded-2xl border border-white/5">
                <p class="text-[10px] text-gray-500">CONF. SCORE</p>
                <p class="text-green-500 font-bold">3/4 🔥</p>
            </div>
        </div>
    </div>

    <div class="w-full max-w-lg flex gap-3">
        <button onclick="startBacktest()" class="glass flex-1 py-4 font-bold hover:bg-white/10 transition">BACKTEST</button>
        <button onclick="aiAnalysis()" class="bg-yellow-500/80 hover:bg-yellow-400 text-black flex-1 py-4 rounded-[25px] font-bold transition shadow-lg shadow-yellow-500/20">ICT SCAN</button>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({
            "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15",
            "timezone": "Etc/UTC", "theme": "dark", "style": "1",
            "container_id": "tradingview_pro", "hide_side_toolbar": false,
            "details": true, "hotlist": true, "calendar": true
        });

        function aiAnalysis() {
            alert("Twin، الـ AI كاعد يحلل الـ FVG والـ MSS الآن. انتظر افتتاح لندن للصيد الحقيقي!");
        }
    </script>
</body>
</html>
