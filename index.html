<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twin Alpha ICT</title>
    <style>
        body { background: #0d0d14; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .iphone-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 30px; padding: 20px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
        .widget { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="iphone-card">
        <h2 style="text-align:center; color: #ffd700;">Twin Alpha 🚀</h2>
        <div class="widget" style="height: 300px;">
            <div id="tv-chart" style="height:100%;"></div>
        </div>
        <div class="widget">
            <p id="status">الرادار جاهز.. بانتظار لندن 🕒</p>
        </div>
    </div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({
            "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15",
            "timezone": "Etc/UTC", "theme": "dark", "style": "1",
            "container_id": "tv-chart", "hide_side_toolbar": true
        });
    </script>
</body>
</html>
